<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="w" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0a0e1a" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Microphone body -->
  <rect x="26" y="12" width="12" height="20" rx="6" fill="url(#g)"/>
  <!-- Mic stand arc -->
  <path d="M20 28 a12 12 0 0 0 24 0" stroke="url(#g)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Mic stand line -->
  <line x1="32" y1="40" x2="32" y2="46" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mic stand base -->
  <line x1="26" y1="46" x2="38" y2="46" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Waveform lines -->
  <line x1="8" y1="26" x2="8" y2="38" stroke="url(#w)" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="22" x2="13" y2="42" stroke="url(#w)" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="25" x2="18" y2="39" stroke="url(#w)" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="25" x2="46" y2="39" stroke="url(#w)" stroke-width="2" stroke-linecap="round"/>
  <line x1="51" y1="22" x2="51" y2="42" stroke="url(#w)" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="26" x2="56" y2="38" stroke="url(#w)" stroke-width="2" stroke-linecap="round"/>
</svg>
